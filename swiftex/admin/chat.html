<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Chat — SwiftEx Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">Swift<span>Ex</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="shipments.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m0 0h3l3 3v4a2 2 0 01-2 2h-1"/><circle cx="7" cy="20" r="2"/><circle cx="17" cy="20" r="2"/></svg>
      Shipments
    </a>
    <a href="chat.html" class="sidebar-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Customer Chat
    </a>
    <div class="sidebar-divider"></div>
    <button class="sidebar-link sidebar-logout" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </nav>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Customer Chat</h1>
      <span class="chat-live-badge">● Live</span>
    </div>
    <div class="topbar-right">
      <span class="agent-status">Agent: <strong id="agentEmail">—</strong></span>
    </div>
  </header>

  <div class="chat-layout">

    <!-- Sessions List -->
    <div class="chat-sessions">
      <div class="chat-sessions-header">
        <h3>Conversations</h3>
        <div class="sessions-filter">
          <button class="filter-tab active" onclick="filterSessions('all', this)">All</button>
          <button class="filter-tab" onclick="filterSessions('escalated', this)">Escalated</button>
        </div>
      </div>
      <div id="sessionsList">
        <div class="session-placeholder">Loading conversations…</div>
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <div class="chat-empty" id="chatEmpty">
        <div style="text-align:center">
          <svg viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1" width="64" height="64" style="margin:0 auto 16px"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <p style="color:#9ca3af;font-size:0.9rem">Select a conversation to start chatting</p>
        </div>
      </div>

      <div id="chatActive" style="display:none;flex-direction:column;height:100%;">
        <div class="chat-window-header">
          <div>
            <h3 id="activeChatTitle">—</h3>
            <span class="chat-tracking-link" id="activeChatTrackingLink"></span>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="status-pill" id="activeChatStatus">—</span>
            <button class="btn-view-public" onclick="viewPublicTracking()" id="viewTrackingBtn" style="font-size:0.78rem;padding:6px 12px;">View Tracking Page</button>
          </div>
        </div>

        <div class="chat-window-messages" id="chatWindowMessages">
          <!-- populated by JS -->
        </div>

        <div class="chat-window-input">
          <input type="text" id="agentInput" placeholder="Type your reply as agent…" autocomplete="off" />
          <button class="chat-send-btn" onclick="sendAgentMessage()">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<style>
.chat-live-badge {
  font-size: 0.75rem;
  font-weight: 700;
  color: #16a34a;
  background: #dcfce7;
  padding: 3px 10px;
  border-radius: 100px;
  letter-spacing: 0.04em;
}
.agent-status { font-size: 0.82rem; color: #6b7280; }
.agent-status strong { color: #4D148C; }
.sessions-filter { display: flex; gap: 4px; margin-top: 8px; }
.filter-tab {
  font-size: 0.75rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  border: 1.5px solid #e5e7eb;
  color: #6b7280;
  background: #fff;
  transition: all 0.15s;
}
.filter-tab.active { background: #4D148C; color: #fff; border-color: #4D148C; }
.session-placeholder { padding: 24px; text-align: center; color: #9ca3af; font-size: 0.85rem; }
.session-item {
  display: flex;
  flex-direction: column;
  padding: 14px 16px;
  border-bottom: 1px solid #f3f4f6;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.session-item:hover { background: #faf9ff; }
.session-item.active { background: #f3eeff; border-right: 3px solid #4D148C; }
.session-item.escalated { border-left: 3px solid #FF6200; }
.session-header { display: flex; justify-content: space-between; align-items: flex-start; }
.session-id { font-family: 'Syne', monospace; font-size: 0.8rem; font-weight: 700; color: #4D148C; }
.session-time { font-size: 0.7rem; color: #9ca3af; white-space: nowrap; margin-left: 8px; }
.session-preview { font-size: 0.8rem; color: #6b7280; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.session-tags { display: flex; gap: 4px; margin-top: 5px; }
.session-tag { font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.tag-escalated { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.tag-ai { background: #f3eeff; color: #6b21a8; border: 1px solid #e9d5ff; }
.unread-dot { width: 8px; height: 8px; background: #FF6200; border-radius: 50%; position: absolute; right: 16px; top: 16px; }
.chat-tracking-link { font-size: 0.75rem; color: #9ca3af; }
.chat-tracking-link a { color: #4D148C; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/config.js"></script>
<script>
let allSessions = [];
let activeSession = null;
let agentEmail = '';
let realtimeChannel = null;
let messagesChannel = null;
let currentFilter = 'all';

// ── Auth guard + boot ──
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  agentEmail = session.user.email;
  document.getElementById('agentEmail').textContent = agentEmail;
  loadSessions();
  subscribeToNewMessages();
})();

// ── Load all chat sessions ──
async function loadSessions() {
  const { data: msgs } = await supabaseClient
    .from('chat_messages')
    .select('tracking_id, session_id, role, content, is_human_agent, created_at')
    .order('created_at', { ascending: false });

  if (!msgs) return;

  // Group by session_id
  const sessionMap = {};
  msgs.forEach(m => {
    if (!sessionMap[m.session_id]) {
      sessionMap[m.session_id] = {
        session_id: m.session_id,
        tracking_id: m.tracking_id,
        last_message: m.content,
        last_time: m.created_at,
        escalated: false,
        message_count: 0,
        has_unread: false,
      };
    }
    sessionMap[m.session_id].message_count++;
    if (m.content === '[ESCALATED TO HUMAN]' || m.is_human_agent) {
      sessionMap[m.session_id].escalated = true;
    }
  });

  allSessions = Object.values(sessionMap).sort((a, b) => new Date(b.last_time) - new Date(a.last_time));
  renderSessions(allSessions);
}

function filterSessions(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'escalated' ? allSessions.filter(s => s.escalated) : allSessions;
  renderSessions(filtered);
}

function renderSessions(sessions) {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    list.innerHTML = '<div class="session-placeholder">No conversations yet.</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.escalated ? 'escalated' : ''} ${activeSession?.session_id === s.session_id ? 'active' : ''}"
         onclick="openSession('${s.session_id}', '${s.tracking_id}')">
      <div class="session-header">
        <span class="session-id">${s.tracking_id}</span>
        <span class="session-time">${timeAgo(s.last_time)}</span>
      </div>
      <div class="session-preview">${escapeHtml(s.last_message || '—')}</div>
      <div class="session-tags">
        ${s.escalated ? '<span class="session-tag tag-escalated">🧑‍💼 Human needed</span>' : '<span class="session-tag tag-ai">🤖 AI chat</span>'}
      </div>
      ${s.has_unread ? '<div class="unread-dot"></div>' : ''}
    </div>
  `).join('');
}

// ── Open a session ──
async function openSession(sessionId, trackingId) {
  activeSession = { session_id: sessionId, tracking_id: trackingId };
  document.getElementById('chatEmpty').style.display = 'none';
  document.getElementById('chatActive').style.display = 'flex';
  document.getElementById('activeChatTitle').textContent = `Session: ${sessionId.slice(0,18)}…`;
  document.getElementById('activeChatTrackingLink').innerHTML =
    `Tracking ID: <a href="../track.html?id=${trackingId}" target="_blank">${trackingId}</a>`;
  document.getElementById('viewTrackingBtn').onclick = () => window.open(`../track.html?id=${trackingId}`, '_blank');

  // Fetch shipment status
  const { data: ship } = await supabaseClient.from('shipments').select('status').eq('tracking_id', trackingId).single();
  if (ship) {
    const pill = document.getElementById('activeChatStatus');
    pill.className = `status-pill status-${ship.status}`;
    pill.textContent = statusLabel(ship.status);
  }

  // Mark session as active in UI
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  loadMessages(sessionId);
  subscribeMessages(sessionId);
}

async function loadMessages(sessionId) {
  const { data: msgs } = await supabaseClient
    .from('chat_messages')
    .select('*')
    .eq('session_id', sessionId)
    .order('created_at', { ascending: true });

  const container = document.getElementById('chatWindowMessages');
  container.innerHTML = '';

  (msgs || []).forEach(m => appendAgentMessage(m));
  container.scrollTop = container.scrollHeight;
}

function appendAgentMessage(m) {
  const container = document.getElementById('chatWindowMessages');
  const isMe = m.is_human_agent;
  const isAI = m.role === 'assistant';
  const isUser = m.role === 'user';

  if (m.content === '[ESCALATED TO HUMAN]') return;

  const cls = isMe ? 'agent-me' : isAI ? 'agent-ai' : 'agent-customer';
  const label = isMe ? '🧑‍💼 You (Agent)' : isAI ? '🤖 AI Assistant' : '👤 Customer';

  const div = document.createElement('div');
  div.className = `agent-message ${cls}`;
  div.innerHTML = `
    <div class="agent-label">${label}</div>
    <div class="agent-bubble">${escapeHtml(m.content)}</div>
    <div class="agent-time">${formatTime(m.created_at)}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── Send agent reply ──
async function sendAgentMessage() {
  const input = document.getElementById('agentInput');
  const text = input.value.trim();
  if (!text || !activeSession) return;
  input.value = '';

  const { error } = await supabaseClient.from('chat_messages').insert({
    tracking_id: activeSession.tracking_id,
    session_id: activeSession.session_id,
    role: 'agent',
    content: text,
    is_human_agent: true,
    agent_name: agentEmail,
  });

  if (error) console.error('Send error:', error);
}

// ── Subscribe to new messages in active session ──
function subscribeMessages(sessionId) {
  if (messagesChannel) supabaseClient.removeChannel(messagesChannel);
  messagesChannel = supabaseClient
    .channel(`agent-chat-${sessionId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages',
      filter: `session_id=eq.${sessionId}`
    }, (payload) => {
      appendAgentMessage(payload.new);
    })
    .subscribe();
}

// ── Subscribe to any new messages (for session list refresh) ──
function subscribeToNewMessages() {
  realtimeChannel = supabaseClient
    .channel('agent-sessions')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages',
    }, () => {
      loadSessions();
    })
    .subscribe();
}

// ── Helpers ──
function viewPublicTracking() {
  if (activeSession) window.open(`../track.html?id=${activeSession.tracking_id}`, '_blank');
}
function statusLabel(s) {
  const m={pending:'Pending',picked_up:'Picked Up',in_transit:'In Transit',out_for_delivery:'Out for Delivery',delivered:'Delivered',exception:'Exception'};
  return m[s] || s;
}
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}
function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
async function doLogout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }

// Enter to send
document.getElementById('agentInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendAgentMessage();
});
</script>
</body>
</html>
